version: '3.9'

services:
  postgres:
    image: postgres:17
    container_name: leads_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: leads_user
      POSTGRES_PASSWORD: leads_password
      POSTGRES_DB: leads_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:8
    container_name: leads_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: leads_user
      MONGO_INITDB_ROOT_PASSWORD: leads_password
      MONGO_INITDB_DATABASE: leads_raw
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7.4
    container_name: leads_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  mongo_data:
  redis_data:
